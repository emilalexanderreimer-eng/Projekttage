<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meine Tabelle</title>
    <style>
        table {
            border-collapse: collapse;
            width: 100%;
        }
        th, td {
            border: 1px solid #999;
            padding: 8px 12px;
            text-align: left;
        }
        th {
            background-color: #f0f0f0;
        }
    </style>
</head>
<body>
    <h1>Meine Tabelle</h1>
    <table>
        <thead>
            <tr>
                <th>Spalte 1</th>
                <th>Spalte 2</th>
                <th>Spalte 3</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Wert 1</td>
                <td>Wert 2</td>
                <td>Wert 3</td>
            </tr>
            <tr>
                <td>Wert 4</td>
                <td>Wert 5</td>
                <td>Wert 6</td>
            </tr>
        </tbody>
    </table>
</body>
</html>
